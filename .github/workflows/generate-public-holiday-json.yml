name: Generate Singapore Public Holiday from MOM
run-name: ${{ github.actor }} is generating Singapore public holiday JSON file
on:
  push:
    branches:
  schedule:
    - cron: '0 15 * * *'
permissions:
  contents: write
jobs:
  generate-public-holiday:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: calendar-parser
        environment-file: environment.yml
        python-version: 3.12.9
        auto-activate-base: false

    - name: Generate public holiday JSON
      run: python calendar_parser.py

    - name: List "json" directory
      run: ls ./json

    - name: Check for new changes to commit and push
      run: |
        git status | grep -q 'nothing to commit' || echo "CHANGES=true" >> $GITHUB_ENV

    - name: Commit generated files
      if: env.CHANGES == 'true'
      run: |
        git config user.name github_actions
        git config user.email 340740+lumtwj@users.noreply.github.com
        git add ./json/*
        git commit -m "Automatically generated by Github actions"
        git push

